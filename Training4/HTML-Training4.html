<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Training 4 - Events & Data Attributes</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 40px auto; }
        .colour-btn { padding: 12px 20px; margin: 4px; border: none; border-radius: 8px; 
        cursor: pointer; color: white; font-weight: bold; }
        .colour-panel { width: 100%; height: 200px; margin-top: 20px;
        border-radius: 12px; border: 2px solid #ddd; display: flex; align-items: center;
        justify-content: center; font-size: 1.5rem; color: white; text-shadow: 0 0 6px black; }
    </style>
</head>
<body>
    <h1>Colour Picker</h1>
    <p>Click a button to change the panel colour:</p>

    <div id="buttonContainer">
        <button class="colour-btn" data-colour="crimson" data-label="Crimson Red">Red</button>
        <button class="colour-btn" data-colour="teal" data-label="Teal">Teal</button>
        <button class="colour-btn" data-colour="goldenrod" data-label="Goldenrod">Gold</button>
        <button class="colour-btn" data-colour="slateblue" data-label="Slate Blue">Blue</button>
        <button class="colour-btn" data-colour="seagreen" data-label="Sea Green">Green</button>
    </div>

    <div class="colour-panel" id="colourPanel">
        Click a colour
    </div>

    <p id="historyText">History: (none)</p>
    <button id="resetHistoryBtn">Reset History</button>

    <script type="module" src="TS-training4.js"></script>
</body>
</html>
